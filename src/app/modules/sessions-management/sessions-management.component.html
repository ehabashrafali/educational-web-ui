<div class="grid w-full mb-10">
  <div class="flex justify-between w-full">
    <p class="text-4xl ms-10 mt-5 font-semibold">Sessions</p>
  </div>

  <div class="grid grid-cols-1 gap-2 m-8">
    <div class="flex flex-auto items-center">
      <mat-form-field class="w-full">
        <mat-icon
          class="icon-size-5"
          [svgIcon]="'heroicons_solid:magnifying-glass'"
          matPrefix
        ></mat-icon>
        <mat-label>Filter</mat-label>
        <input
          matInput
          (keyup)="applyFilter($event)"
          placeholder="Ex. ium"
          #input
        />
      </mat-form-field>
      <button
        class="ml-4 min-w-10 px-1 sm:px-4"
        mat-flat-button
        [color]="'primary'"
        (click)="addSessionInfo()"
      >
        <mat-icon
          class="icon-size-5"
          [svgIcon]="'heroicons_solid:plus-circle'"
        ></mat-icon>
        <span class="ml-2 hidden sm:inline-block">New Session</span>
      </button>
    </div>

    <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">
      <ng-container matColumnDef="Date">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
        <td mat-cell *matCellDef="let session">
          {{ session.date | date: "yyyy-MM-dd" }}
        </td>
      </ng-container>

      <ng-container matColumnDef="InstructorName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          Instructor Name
        </th>
        <td mat-cell *matCellDef="let session">{{ session.instructorName }}</td>
      </ng-container>

      <ng-container matColumnDef="StudentName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Student Name</th>
        <td mat-cell *matCellDef="let session">{{ session.studentName }}</td>
      </ng-container>

      <ng-container matColumnDef="Duration">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Duration</th>
        <td mat-cell *matCellDef="let session">{{ session.duration }}</td>
      </ng-container>

      <ng-container matColumnDef="Actions">
        <th mat-header-cell *matHeaderCellDef class="text-center">Actions</th>
        <td mat-cell *matCellDef="let session" class="text-right">
          <button
            mat-icon-button
            [matMenuTriggerFor]="menu"
            aria-label="Actions menu"
            (click)="$event.stopPropagation()"
          >
            <mat-icon>more_vert</mat-icon>
          </button>

          <mat-menu #menu="matMenu">
            <button mat-menu-item (click)="edit(session.id)">
              <mat-icon>edit</mat-icon>
              <span>Edit</span>
            </button>
            <button mat-menu-item (click)="delete(session.id)">
              <mat-icon>delete</mat-icon>
              <span>Delete</span>
            </button>
          </mat-menu>
        </td>
      </ng-container>

      <tr
        mat-header-row
        *matHeaderRowDef="displayedColumns"
        class="bg-primary text-white border-b pb-3 text-center rounded-t-md"
      ></tr>

      <tr
        mat-row
        class="clickable-row"
        *matRowDef="let row; columns: displayedColumns"
      ></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="5">
          No data matching the filter
        </td>
      </tr>
    </table>

    <mat-paginator
      #paginator
      [length]="totalRecords"
      [pageSize]="10"
      [pageSizeOptions]="[5, 10, 25, 100]"
      aria-label="Select page"
    ></mat-paginator>
  </div>
</div>
